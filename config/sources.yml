  - name: sjc_gold_prices
    pipeline: price
    source_type: json
    url: ""
    category_default: "gia_vang"
    active: true
    fetch_interval_minutes: 15
    demo_only_source: true
    demo_fixture: "data/fixtures/price/gold_prices.json"

  - name: sjc_gold_prices_live
    pipeline: price
    source_type: json
    url: "https://sjc.com.vn/GoldPrice/Services/PriceService.ashx"
    parser: "sjc_gold_json"
    category_default: "gia_vang"
    active: true
    fetch_interval_minutes: 15
    timeout_seconds: 15
    retry_count: 2
    request_method: "POST"
    form_data:
      method: "GetCurrentGoldPricesByBranch"
      BranchId: "1"
    unit: "VND/lượng"
    type_map:
      "Vàng SJC 1L, 10L, 1KG": "gia-vang-sjc"
      "Vàng nhẫn SJC 99,99% 1 chỉ, 2 chỉ, 5 chỉ": "gia-vang-nhan-9999"

  - name: petrolimex_fuel_prices
    pipeline: price
    source_type: json
    url: ""
    category_default: "gia_xang"
    active: true
    fetch_interval_minutes: 20
    demo_only_source: true
    demo_fixture: "data/fixtures/price/fuel_prices.json"

  - name: petrolimex_fuel_prices_live
    pipeline: price
    source_type: json
    url: "https://portals.petrolimex.com.vn/~apis/portals/cms.item/search"
    parser: "petrolimex_fuel_json"
    category_default: "gia_xang"
    active: true
    fetch_interval_minutes: 20
    timeout_seconds: 12
    retry_count: 2
    query_params:
      x-request: ""
      language: "vi-VN"
    item_type: "fuel"
    region: "Vùng 1"
    unit: "VND/lít"
    price_field: "Zone1Price"
    product_map:
      "Xăng RON 95-III": "gia-xang-ron95-iii"
      "Xăng E5 RON 92-II": "gia-xang-e5-ron92"
      "Xăng RON 95-V": "gia-xang-ron95-v"
      "Xăng E10 RON 95-III": "gia-xang-e10-ron95-iii"
      "DO 0,001S-V": "gia-dau-do-0001s-v"
      "DO 0,05S-II": "gia-dau-do-005s-ii"
      "Dầu hỏa 2-K": "gia-dau-hoa-2k"

  - name: sbv_fx_rates
    pipeline: price
    source_type: json
    url: ""
    category_default: "ty_gia"
    active: true
    fetch_interval_minutes: 30
    demo_only_source: true
    demo_fixture: "data/fixtures/price/fx_rates.json"

  - name: sbv_fx_rates_live
    pipeline: price
    source_type: html
    url: "https://www.sbv.gov.vn/t%E1%BB%B7-gi%C3%A1"
    parser: "sbv_fx_html"
    category_default: "ty_gia"
    active: true
    fetch_interval_minutes: 30
    timeout_seconds: 12
    retry_count: 2
    item_type: "ty_gia"
    region: "Viet Nam"
    currencies:
      - "USD"
      - "EUR"
      - "JPY"
      - "GBP"
    item_name_map:
      "USD": "ty-gia-usd-ban-ra"
      "EUR": "ty-gia-eur-sbv"
      "JPY": "ty-gia-jpy-sbv"
      "GBP": "ty-gia-gbp-sbv"
    central_rate_item_name: "ty-gia-usd-trung-tam-sbv"

  - name: vietcombank_fx_rates_live
    pipeline: price
    source_type: xml
    url: "https://portal.vietcombank.com.vn/Usercontrols/TVPortal.TyGia/pXML.aspx"
    parser: "vietcombank_fx_xml"
    category_default: "ty_gia"
    active: true
    fetch_interval_minutes: 30
    timeout_seconds: 12
    retry_count: 2
    query_params:
      b: "68"
    item_type: "ty_gia"
    region: "Vietcombank"
    unit: "VND"
    provider_suffix: "vcb"
    currencies:
      - "USD"
      - "EUR"
      - "JPY"
      - "GBP"

  - name: nchmf_weather_daily
    pipeline: weather
    source_type: json
