    <div class="detail-content afcbc-body" data-role="content">
      <p>Ông Lê Quốc Phong yêu cầu các cơ quan thuộc Đảng bộ các cơ quan Đảng TP.HCM tập trung xây dựng dự thảo nghị quyết phát triển thành phố trong kỷ nguyên mới.</p>
      <p>Đồng thời, các đơn vị phải hoàn thiện dự thảo Luật Đô thị đặc biệt để trình Quốc hội vào tháng 11-2026.</p>
